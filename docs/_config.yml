title: Murmur Studio
description: A macOS app for analyst review of clinical ECG findings over PhysioNet WFDB recordings. Available on the Mac App Store.
remote_theme: just-the-docs/just-the-docs

# Site URL — let GitHub Pages set baseurl automatically for project pages.
url: https://kvnlng.github.io
baseurl: /Murmur

# Just-the-docs config
color_scheme: light
search_enabled: true
heading_anchors: true
nav_external_links:
  - title: Get on the App Store
    # TODO: replace with the canonical product URL once known
    # (e.g. https://apps.apple.com/app/murmur-studio/id1234567890)
    url: https://www.apple.com/search/Murmur-Studio?src=globalnav
    hide_icon: false

# Aux links rendered at the top right of every page.
aux_links:
  App Store: "https://www.apple.com/search/Murmur-Studio?src=globalnav"

# Footer
footer_content: "© 2026 Kevin Long."

# Markdown
markdown: kramdown
kramdown:
  syntax_highlighter: rouge

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
